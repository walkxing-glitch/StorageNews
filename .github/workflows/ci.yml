name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # github.repository returns username/repository (e.g., walkxing-glitch/StorageNews)
  SERVER_IMAGE_NAME: ${{ github.repository }}-server
  DASHBOARD_IMAGE_NAME: ${{ github.repository }}-dashboard

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: storage_news_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Build TypeScript
      working-directory: ./server
      run: npm run build
    
    - name: Run tests
      working-directory: ./server
      run: npm test || echo "No tests configured yet"
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: storage_news_test
        DB_USER: postgres
        DB_PASSWORD: postgres

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # This job only runs when pushing to main branch, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    # Needs permissions to push to GitHub Packages
    permissions:
      contents: read
      packages: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata (tags, labels) for Server
      id: meta-server
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}
        
    - name: Extract metadata (tags, labels) for Dashboard
      id: meta-dashboard
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}

    - name: Build and push Server image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile.prod
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest,${{ steps.meta-server.outputs.tags }}
        labels: ${{ steps.meta-server.outputs.labels }}
        
    - name: Build and push Dashboard image
      uses: docker/build-push-action@v5
      with:
        context: ./dashboard
        file: ./dashboard/Dockerfile.prod
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}:latest,${{ steps.meta-dashboard.outputs.tags }}
        labels: ${{ steps.meta-dashboard.outputs.labels }}
