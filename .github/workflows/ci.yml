name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: storage_news_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Run ESLint
      working-directory: ./server
      run: npm run lint || true
    
    - name: Run Prettier check
      working-directory: ./server
      run: npm run format:check || true
    
    - name: Build TypeScript
      working-directory: ./server
      run: npm run build
    
    - name: Run tests
      working-directory: ./server
      run: npm test || echo "No tests configured yet"
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: storage_news_test
        DB_USER: postgres
        DB_PASSWORD: postgres

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      working-directory: ./server
      run: docker build -t storagenews/backend:latest .
    
    - name: Test Docker image
      run: docker run --rm storagenews/backend:latest node --version
