name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # 显式使用小写镜像名，避免大小写导致的权限或拉取问题
  SERVER_IMAGE_NAME: walkxing-glitch/storagenews-server
  DASHBOARD_IMAGE_NAME: walkxing-glitch/storagenews-dashboard

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: storage_news_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          server/package-lock.json
          dashboard/package-lock.json
    
    # 后端检查
    - name: Install Server dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Run Server Lint
      working-directory: ./server
      run: npm run lint || echo "Lint warnings found"
    
    - name: Server Build & Test
      working-directory: ./server
      run: |
        npm run build
        npm test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: storage_news_test
        DB_USER: postgres
        DB_PASSWORD: postgres

    # 前端检查
    - name: Install Dashboard dependencies
      working-directory: ./dashboard
      run: npm ci

    - name: Dashboard Build Check
      working-directory: ./dashboard
      run: npm run build

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata (tags, labels) for Server
      id: meta-server
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}
        
    - name: Extract metadata (tags, labels) for Dashboard
      id: meta-dashboard
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}

    - name: Build and push Server image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile.prod
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest,${{ steps.meta-server.outputs.tags }}
        labels: ${{ steps.meta-server.outputs.labels }}
        
    - name: Build and push Dashboard image
      uses: docker/build-push-action@v5
      with:
        context: ./dashboard
        file: ./dashboard/Dockerfile.prod
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}:latest,${{ steps.meta-dashboard.outputs.tags }}
        labels: ${{ steps.meta-dashboard.outputs.labels }}
