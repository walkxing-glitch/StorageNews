version: '3.8'

services:
  mobile-dev:
    build: 
      context: .
      dockerfile: Dockerfile.standalone
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=1
    stdin_open: true
    tty: true