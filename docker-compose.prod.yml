# Production Docker Compose Configuration
version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: storage-news-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - storage-news-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: storage-news-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL}
      WELINK_WEBHOOK_URL: ${WELINK_WEBHOOK_URL}
      DAILY_PUSH_TIME: ${DAILY_PUSH_TIME:-09:00}
      WECHAT_BOT_ENABLED: ${WECHAT_BOT_ENABLED:-false}
      WECHAT_TARGET_GROUP: ${WECHAT_TARGET_GROUP}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - storage-news-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.prod
    container_name: storage-news-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - storage-news-network
    depends_on:
      - server

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: storage-news-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - server
      - dashboard
    networks:
      - storage-news-network

  # Monitoring (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: storage-news-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - storage-news-network

  # Logging (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: storage-news-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - storage-news-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  nginx_logs:

networks:
  storage-news-network:
    driver: bridge
