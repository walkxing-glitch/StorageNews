services:
  # PostgreSQL 数据库
  database:
    image: postgres:15-alpine
    container_name: qoder_storage_news_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storage_news
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Node.js 后端服务
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: qoder_storage_news_server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - PORT=${PORT}
      - WECHAT_WEBHOOK_URL=${WECHAT_WEBHOOK_URL}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL}
    ports:
      - "3001:3000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # Web 仪表板
  dashboard:
    build: 
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: qoder_storage_news_dashboard
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

  # 移动应用开发环境
  mobile-dev:
    build: 
      context: ./mobile
      dockerfile: Dockerfile.standalone
    container_name: qoder_storage_news_mobile
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=1
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: qoder_storage_news_network